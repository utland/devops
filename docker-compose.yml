services:
  inventory-app:
    build: 
      context: .
      dockerfile: ./Dockerfile
      target: prod
    container_name: inventory-app
    command: sh -c "node ./dist/database/migration.js && node ./dist/main.js"
    env_file:
      - /etc/inventory-app/config.env
    ports:
      - 8000:8000
    networks:
      - inventory-network
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
  
  nginx:
    image: nginx:alpine
    container_name: nginx-labs
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - inventory-network
    depends_on:
      - inventory-app
  
  postgres:
    image: postgres:16
    container_name: devops-db
    environment:
      POSTGRES_USER: user123
      POSTGRES_PASSWORD: password
      POSTGRES_DB: inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user123} -d ${DB_DATABASE:-inventory}"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - inventory-network

networks:
  inventory-network:
    driver: bridge

volumes:
  postgres-data: